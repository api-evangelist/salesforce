  /query/{jobId}/results:
    get:
      operationId: getQueryJobResults
      summary: Salesforce Get Query Job Results
      description: >
        Returns the results of a completed query job as CSV data. The results
        may be paginated; check for a Sforce-Locator response header to retrieve
        subsequent pages by passing the locator value as a query parameter. Only
        available after the job reaches JobComplete state.
      tags:
      - Query Job Results
      parameters:
      - $ref: '#/components/parameters/jobId'
      - name: maxRecords
        in: query
        required: false
        description: >
          Maximum number of records to return in this response. Defaults to
          50000. Use with the locator parameter to paginate through large
          result sets.
        schema:
          type: integer
          default: 50000
        example: 10
      - name: locator
        in: query
        required: false
        description: >
          A locator token from the Sforce-Locator response header of a
          previous request to retrieve the next page of results.
        schema:
          type: string
        example: example_value
      responses:
        '200':
          description: >
            CSV data containing query results. Check the Sforce-Locator response
            header for a locator token to retrieve subsequent pages.
          headers:
            Sforce-Locator:
              description: >
                Locator token for the next page of results. Pass this value as
                the locator query parameter in subsequent requests. If this
                header is absent or has value "null", no more pages remain.
              schema:
                type: string
            Sforce-NumberOfRecords:
              description: Number of records returned in this response.
              schema:
                type: integer
          content:
            text/csv:
              schema:
                type: string
