openapi: 3.1.0
info:
  title: Salesforce Bulk API 2.0
  description: >
    Salesforce Bulk API 2.0 is a simplified, REST-based interface for bulk data
    operations that improves on the original Bulk API. It uses a straightforward
    job model and supports CSV format for ingest and query jobs, enabling
    processing of millions of records asynchronously.
  version: v63.0
  contact:
    name: Salesforce Developers
    url: https://developer.salesforce.com/
  license:
    name: Salesforce Developer Terms
    url: https://www.salesforce.com/company/legal/agreements/
servers:
- url: https://{instance}.salesforce.com/services/data/v{version}/jobs
  description: Salesforce Bulk API 2.0 jobs endpoint
  variables:
    instance:
      default: yourInstance
      description: >
        The Salesforce instance identifier (e.g., na1, eu3, or a My Domain
        subdomain like mycompany).
    version:
      default: '63.0'
      description: >
        The Salesforce API version number (e.g., 63.0). Use the latest
        supported version for new integrations.
security:
- BearerAuth: []
tags:
- name: Ingest Job Data
  description: >
    Operations for uploading CSV data to ingest jobs and retrieving job
    results (successful, failed, and unprocessed records).
- name: Ingest Jobs
  description: >
    Operations for creating and managing ingest jobs that insert, update,
    upsert, delete, or hard delete records in bulk using CSV data.
- name: Query Job Results
  description: >
    Operations for retrieving the results of completed query jobs as CSV
    data.
- name: Query Jobs
  description: >
    Operations for creating and managing query jobs that extract large
    volumes of data from Salesforce using SOQL.
paths:
  /ingest:
    post:
      operationId: createIngestJob
      summary: Salesforce Create an Ingest Job
      description: >
        Creates a new ingest job for bulk data operations (insert, update,
        upsert, delete, or hardDelete). After creating the job, upload data
        using the PUT /ingest/{jobId}/batches endpoint, then close the job
        to begin processing. Monitor the job state until it reaches JobComplete
        or Failed.
      tags:
      - Ingest Jobs
      requestBody:
        required: true
        description: Configuration for the new ingest job.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestJobRequest'
            examples:
              CreateingestjobRequestExample:
                summary: Default createIngestJob request
                x-microcks-default: true
                value:
                  operation: insert
                  object: example_value
                  externalIdFieldName: example_value
                  contentType: CSV
                  lineEnding: LF
                  columnDelimiter: COMMA
                  assignmentRuleId: '500123'
      responses:
        '200':
          description: Ingest job created successfully with Open state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestJobInfo'
              examples:
                Createingestjob200Example:
                  summary: Default createIngestJob 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    operation: insert
                    object: example_value
                    state: Open
                    createdDate: '2026-01-15T10:30:00Z'
                    systemModstamp: '2026-01-15T10:30:00Z'
                    numberRecordsProcessed: 10
                    numberRecordsFailed: 10
                    totalProcessingTime: 1700000000000
                    errorMessage: example_value
                    contentType: CSV
                    lineEnding: LF
                    columnDelimiter: COMMA
                    externalIdFieldName: example_value
                    jobType: example_value
                    createdById: '500123'
                    apiVersion: 42.5
        '400':
          description: >
            Bad request. Invalid operation, object type, or configuration
            parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Createingestjob400Example:
                  summary: Default createIngestJob 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Createingestjob401Example:
                  summary: Default createIngestJob 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: listIngestJobs
      summary: Salesforce List Ingest Jobs
      description: >
        Returns a list of ingest jobs in the org. By default returns all jobs
        created by all users. Use query parameters to filter by state or other
        criteria. Results are ordered by creation date descending.
      tags:
      - Ingest Jobs
      parameters:
      - name: isPkChunkingEnabled
        in: query
        required: false
        description: >
          Filter results to only jobs with PK chunking enabled (true) or
          disabled (false).
        schema:
          type: boolean
        example: true
      - name: jobType
        in: query
        required: false
        description: >
          Filter results by job type. Use Classic for Bulk API 1.0 jobs or
          V2Ingest for Bulk API 2.0 ingest jobs.
        schema:
          type: string
          enum:
          - Classic
          - V2Ingest
        example: Classic
      responses:
        '200':
          description: List of ingest jobs matching the filter criteria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  done:
                    type: boolean
                    description: >
                      Whether all jobs have been returned. If false, use
                      nextRecordsUrl to retrieve more.
                  nextRecordsUrl:
                    type: string
                    format: uri
                    description: URL to retrieve the next page of job results.
                  records:
                    type: array
                    description: Array of ingest job information objects.
                    items:
                      $ref: '#/components/schemas/IngestJobInfo'
              examples:
                Listingestjobs200Example:
                  summary: Default listIngestJobs 200 response
                  x-microcks-default: true
                  value:
                    done: true
                    nextRecordsUrl: https://www.example.com
                    records:
                    - id: abc123
                      operation: insert
                      object: example_value
                      createdDate: '2026-01-15T10:30:00Z'
                      systemModstamp: '2026-01-15T10:30:00Z'
                      numberRecordsProcessed: 10
                      numberRecordsFailed: 10
                      totalProcessingTime: 1700000000000
                      errorMessage: example_value
                      contentType: CSV
                      lineEnding: LF
                      columnDelimiter: COMMA
                      externalIdFieldName: example_value
                      jobType: example_value
                      createdById: '500123'
                      apiVersion: 42.5
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Listingestjobs401Example:
                  summary: Default listIngestJobs 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ingest/{jobId}:
    get:
      operationId: getIngestJobInfo
      summary: Salesforce Get Ingest Job Info
      description: >
        Returns detailed information about a specific ingest job, including its
        current state, number of records processed, number of failures, and
        any error messages. Use this to monitor job progress and determine when
        processing is complete.
      tags:
      - Ingest Jobs
      parameters:
      - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: Detailed information about the specified ingest job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestJobInfo'
              examples:
                Getingestjobinfo200Example:
                  summary: Default getIngestJobInfo 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    operation: insert
                    object: example_value
                    state: Open
                    createdDate: '2026-01-15T10:30:00Z'
                    systemModstamp: '2026-01-15T10:30:00Z'
                    numberRecordsProcessed: 10
                    numberRecordsFailed: 10
                    totalProcessingTime: 1700000000000
                    errorMessage: example_value
                    contentType: CSV
                    lineEnding: LF
                    columnDelimiter: COMMA
                    externalIdFieldName: example_value
                    jobType: example_value
                    createdById: '500123'
                    apiVersion: 42.5
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getingestjobinfo401Example:
                  summary: Default getIngestJobInfo 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found for the specified job ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getingestjobinfo404Example:
                  summary: Default getIngestJobInfo 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      operationId: updateIngestJob
      summary: Salesforce Update or Close an Ingest Job
      description: >
        Updates the state of an ingest job. Use this to close the job after
        uploading all data (set state to UploadComplete), which triggers
        processing. Can also abort a job that is Open or UploadComplete by
        setting state to Aborted.
      tags:
      - Ingest Jobs
      parameters:
      - $ref: '#/components/parameters/jobId'
      requestBody:
        required: true
        description: State update for the ingest job.
        content:
          application/json:
            schema:
              type: object
              required:
              - state
              properties:
                state:
                  type: string
                  enum:
                  - UploadComplete
                  - Aborted
                  description: >
                    The new state to set for the job. Use UploadComplete to
                    close the job and begin processing, or Aborted to cancel
                    the job.
            examples:
              UpdateingestjobRequestExample:
                summary: Default updateIngestJob request
                x-microcks-default: true
                value:
                  state: UploadComplete
      responses:
        '200':
          description: Ingest job updated successfully with the new state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestJobInfo'
              examples:
                Updateingestjob200Example:
                  summary: Default updateIngestJob 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    operation: insert
                    object: example_value
                    state: Open
                    createdDate: '2026-01-15T10:30:00Z'
                    systemModstamp: '2026-01-15T10:30:00Z'
                    numberRecordsProcessed: 10
                    numberRecordsFailed: 10
                    totalProcessingTime: 1700000000000
                    errorMessage: example_value
                    contentType: CSV
                    lineEnding: LF
                    columnDelimiter: COMMA
                    externalIdFieldName: example_value
                    jobType: example_value
                    createdById: '500123'
                    apiVersion: 42.5
        '400':
          description: Bad request. Invalid state transition for the current job state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Updateingestjob400Example:
                  summary: Default updateIngestJob 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Updateingestjob401Example:
                  summary: Default updateIngestJob 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found for the specified job ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Updateingestjob404Example:
                  summary: Default updateIngestJob 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteIngestJob
      summary: Salesforce Delete an Ingest Job
      description: >
        Deletes an ingest job and all associated data. Only jobs in the Aborted
        state can be deleted. First abort the job if it is in a different state,
        then delete it.
      tags:
      - Ingest Jobs
      parameters:
      - $ref: '#/components/parameters/jobId'
      responses:
        '204':
          description: Ingest job deleted successfully. No body is returned.
        '400':
          description: >
            Bad request. Job is not in Aborted state and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Deleteingestjob400Example:
                  summary: Default deleteIngestJob 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Deleteingestjob401Example:
                  summary: Default deleteIngestJob 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found for the specified job ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Deleteingestjob404Example:
                  summary: Default deleteIngestJob 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ingest/{jobId}/batches:
    put:
      operationId: uploadJobData
      summary: Salesforce Upload Job Data (csv)
      description: >
        Uploads CSV data to an ingest job that is in the Open state. The CSV
        must include a header row matching the field API names for the object.
        Multiple upload calls can be made for the same job; data is appended.
        After uploading all data, close the job with PATCH /ingest/{jobId} to
        begin processing.
      tags:
      - Ingest Job Data
      parameters:
      - $ref: '#/components/parameters/jobId'
      requestBody:
        required: true
        description: >
          CSV data to upload to the ingest job. The first row must be a header
          row with field API names.
        content:
          text/csv:
            schema:
              type: string
              format: binary
              description: >
                CSV-formatted data with a header row and one record per
                subsequent row. Field names in the header must match the
                Salesforce field API names for the object.
            examples:
              UploadjobdataRequestExample:
                summary: Default uploadJobData request
                x-microcks-default: true
                value: example_value
      responses:
        '201':
          description: Data uploaded successfully to the ingest job.
        '400':
          description: >
            Bad request. Invalid CSV format, job not in Open state, or data
            exceeds size limits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Uploadjobdata400Example:
                  summary: Default uploadJobData 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Uploadjobdata401Example:
                  summary: Default uploadJobData 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found for the specified job ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Uploadjobdata404Example:
                  summary: Default uploadJobData 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ingest/{jobId}/successfulResults:
    get:
      operationId: getSuccessfulResults
      summary: Salesforce Get Successful Records From an Ingest Job
      description: >
        Returns a CSV file containing the records that were successfully
        processed by the ingest job. Each row corresponds to a record from the
        uploaded data that was inserted, updated, upserted, or deleted
        successfully. Only available after the job reaches JobComplete state.
      tags:
      - Ingest Job Data
      parameters:
      - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: >
            CSV data containing the successfully processed records, with
            sf__Id and sf__Created columns added.
          content:
            text/csv:
              schema:
                type: string
                description: >
                  CSV data of successfully processed records. Includes sf__Id
                  (the Salesforce record ID) and sf__Created (true if created,
                  false if updated) columns.
              examples:
                Getsuccessfulresults200Example:
                  summary: Default getSuccessfulResults 200 response
                  x-microcks-default: true
                  value: example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getsuccessfulresults401Example:
                  summary: Default getSuccessfulResults 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found or job has not completed processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getsuccessfulresults404Example:
                  summary: Default getSuccessfulResults 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ingest/{jobId}/failedResults:
    get:
      operationId: getFailedResults
      summary: Salesforce Get Failed Records From an Ingest Job
      description: >
        Returns a CSV file containing the records from the ingest job that
        failed to process. Each row includes the original record data plus
        sf__Error and sf__Id columns describing the failure reason. Use this
        to identify and fix records that need to be resubmitted.
      tags:
      - Ingest Job Data
      parameters:
      - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: >
            CSV data containing failed records with error details in the
            sf__Error column.
          content:
            text/csv:
              schema:
                type: string
                description: >
                  CSV data of failed records. Includes sf__Error (error message
                  describing the failure) and sf__Id (the record ID if
                  applicable) columns.
              examples:
                Getfailedresults200Example:
                  summary: Default getFailedResults 200 response
                  x-microcks-default: true
                  value: example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getfailedresults401Example:
                  summary: Default getFailedResults 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found or job has not completed processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getfailedresults404Example:
                  summary: Default getFailedResults 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ingest/{jobId}/unprocessedrecords:
    get:
      operationId: getUnprocessedRecords
      summary: Salesforce Get Unprocessed Records From an Ingest Job
      description: >
        Returns a CSV file containing the records from the ingest job that were
        not processed, typically because the job was aborted before processing
        completed. Use these records to resubmit them in a new job.
      tags:
      - Ingest Job Data
      parameters:
      - $ref: '#/components/parameters/jobId'
      responses:
        '200':
          description: CSV data containing unprocessed records from the aborted job.
          content:
            text/csv:
              schema:
                type: string
                description: >
                  CSV data of unprocessed records in the same format as the
                  original uploaded data.
              examples:
                Getunprocessedrecords200Example:
                  summary: Default getUnprocessedRecords 200 response
                  x-microcks-default: true
                  value: example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getunprocessedrecords401Example:
                  summary: Default getUnprocessedRecords 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Job not found for the specified job ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getunprocessedrecords404Example:
                  summary: Default getUnprocessedRecords 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /query:
    post:
      operationId: createQueryJob
      summary: Salesforce Create a Query Job
      description: >
        Creates a new query job to extract large volumes of data from Salesforce
        using a SOQL query. Query jobs are asynchronous; after creating the job,
        poll the job status until it reaches JobComplete, then retrieve results
        using the GET /query/{jobId}/results endpoint.
      tags:
      - Query Jobs
      requestBody:
        required: true
        description: Configuration for the new query job including the SOQL query.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryJobRequest'
            examples:
              CreatequeryjobRequestExample:
                summary: Default createQueryJob request
                x-microcks-default: true
                value:
                  operation: query
                  query: example_value
                  contentType: CSV
                  columnDelimiter: COMMA
                  lineEnding: LF
      responses:
        '200':
          description: Query job created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryJobInfo'
              examples:
                Createqueryjob200Example:
                  summary: Default createQueryJob 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    operation: query
                    object: example_value
                    state: Open
                    createdDate: '2026-01-15T10:30:00Z'
                    systemModstamp: '2026-01-15T10:30:00Z'
                    numberRecordsProcessed: 10
                    totalProcessingTime: 1700000000000
                    errorMessage: example_value
                    contentType: CSV
                    columnDelimiter: COMMA
                    lineEnding: LF
                    jobType: example_value
                    createdById: '500123'
                    apiVersion: 42.5
        '400':
          description: Bad request. Invalid SOQL query or configuration parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Createqueryjob400Example:
                  summary: Default createQueryJob 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Createqueryjob401Example:
                  summary: Default createQueryJob 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: listQueryJobs
      summary: Salesforce List Query Jobs
      description: >
        Returns a list of query jobs in the org. Results are ordered by creation
        date descending. Use query parameters to filter by job state.
      tags:
      - Query Jobs
      parameters:
      - name: jobType
        in: query
        required: false
        description: >
          Filter results by job type. Use V2Query for Bulk API 2.0 query
          jobs.
        schema:
          type: string
          enum:
          - V2Query
        example: V2Query
      responses:
        '200':
          description: List of query jobs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  done:
                    type: boolean
                    description: Whether all jobs have been returned.
                  nextRecordsUrl:
                    type: string
                    format: uri
                    description: URL to retrieve the next page of query job results.
                  records:
                    type: array
                    description: Array of query job information objects.
                    items:
                      $ref: '#/components/schemas/QueryJobInfo'
              examples:
                Listqueryjobs200Example:
                  summary: Default listQueryJobs 200 response
                  x-microcks-default: true
                  value:
                    done: true
                    nextRecordsUrl: https://www.example.com
                    records:
                    - id: abc123
                      operation: query
                      object: example_value
                      createdDate: '2026-01-15T10:30:00Z'
                      systemModstamp: '2026-01-15T10:30:00Z'
                      numberRecordsProcessed: 10
                      totalProcessingTime: 1700000000000
                      errorMessage: example_value
                      contentType: CSV
                      columnDelimiter: COMMA
                      lineEnding: LF
                      jobType: example_value
                      createdById: '500123'
