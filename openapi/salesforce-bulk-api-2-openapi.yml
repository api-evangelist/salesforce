components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        OAuth 2.0 Bearer token obtained from the Salesforce OAuth 2.0 token
        endpoint. Include this token in the Authorization header as
        "Bearer {access_token}".
  parameters:
    jobId:
      name: jobId
      in: path
      required: true
      description: The unique identifier of the Bulk API 2.0 job.
      schema:
        type: string
  schemas:
    JobState:
      type: string
      description: >
        The current state of a Bulk API 2.0 job, indicating where it is in its
        lifecycle.
      enum:
      - Open
      - UploadComplete
      - InProgress
      - JobComplete
      - Failed
      - Aborted
    IngestJobRequest:
      type: object
      description: >
        Configuration parameters for creating a new Bulk API 2.0 ingest job.
      required:
      - operation
      - object
      properties:
        operation:
          type: string
          enum:
          - insert
          - update
          - upsert
          - delete
          - hardDelete
          description: >
            The DML operation to perform on the records. Use insert to create
            new records, update to modify existing records, upsert to create or
            update based on an external ID, delete to soft-delete records, or
            hardDelete to permanently delete records.
          example: insert
        object:
          type: string
          description: >
            The API name of the Salesforce SObject type for this job (e.g.,
            Account, Contact, MyCustomObject__c).
          example: example_value
        externalIdFieldName:
          type: string
          description: >
            Required for upsert operations. The API name of the external ID
            field used to match records for upsert.
          example: example_value
        contentType:
          type: string
          enum:
          - CSV
          default: CSV
          description: >
            The format of the data to be uploaded. Currently only CSV is
            supported.
          example: CSV
        lineEnding:
          type: string
          enum:
          - LF
          - CRLF
          default: LF
          description: >
            The line ending character used in the uploaded CSV data. Use LF for
            Unix-style line endings or CRLF for Windows-style.
          example: LF
        columnDelimiter:
          type: string
          enum:
          - COMMA
          - TAB
          - PIPE
          - SEMICOLON
          - CARET
          - BACKQUOTE
          default: COMMA
          description: >
            The delimiter character used between fields in the CSV data.
            Defaults to COMMA.
          example: COMMA
        assignmentRuleId:
          type: string
          description: >
            The ID of an assignment rule to apply when inserting or updating
            Case or Lead records.
          example: '500123'
    IngestJobInfo:
      type: object
      description: >
        Detailed information about a Bulk API 2.0 ingest job, including its
        current state and processing statistics.
      properties:
        id:
          type: string
          description: The unique identifier of the ingest job.
          example: abc123
        operation:
          type: string
          enum:
          - insert
          - update
          - upsert
          - delete
          - hardDelete
          description: The DML operation being performed by this job.
          example: insert
        object:
          type: string
          description: The API name of the SObject type being processed.
          example: example_value
        state:
          $ref: '#/components/schemas/JobState'
        createdDate:
          type: string
          format: date-time
          description: The date and time the job was created, in ISO 8601 format.
          example: '2026-01-15T10:30:00Z'
        systemModstamp:
          type: string
          format: date-time
          description: >
            The date and time the job was last modified, in ISO 8601 format.
          example: '2026-01-15T10:30:00Z'
        numberRecordsProcessed:
          type: integer
          description: >
            The number of records processed so far. Updated after processing
            completes.
          example: 10
        numberRecordsFailed:
          type: integer
          description: The number of records that failed during processing.
          example: 10
        totalProcessingTime:
          type: integer
          description: Total processing time in milliseconds.
          example: 1700000000000
        errorMessage:
          type: string
          description: >
            Error message if the job reached the Failed state. Describes the
            reason for failure.
          example: example_value
        contentType:
          type: string
          enum:
          - CSV
          description: The content type of the data uploaded to this job.
          example: CSV
        lineEnding:
          type: string
          enum:
          - LF
          - CRLF
          description: The line ending used in the uploaded data.
          example: LF
        columnDelimiter:
          type: string
          enum:
          - COMMA
          - TAB
          - PIPE
          - SEMICOLON
          - CARET
          - BACKQUOTE
          description: The column delimiter used in the uploaded data.
          example: COMMA
        externalIdFieldName:
          type: string
          description: >
            The external ID field name used for upsert operations. Only present
            for upsert jobs.
          example: example_value
        jobType:
          type: string
          description: The job type (V2Ingest for Bulk API 2.0 ingest jobs).
          example: example_value
        createdById:
          type: string
          description: The Salesforce user ID of the user who created the job.
          example: '500123'
        apiVersion:
          type: number
          description: The API version used to create the job.
          example: 42.5
    QueryJobRequest:
      type: object
      description: Configuration parameters for creating a new Bulk API 2.0 query job.
      required:
      - operation
      - query
      properties:
        operation:
          type: string
          enum:
          - query
          - queryAll
          description: >
            The query operation to perform. Use query to retrieve active records
            only, or queryAll to include soft-deleted and archived records.
          example: query
        query:
          type: string
          description: >
            The SOQL query to execute. The query result will be available as CSV
            data after the job completes.
          example: SELECT Id, Name, Email, Phone FROM Contact WHERE CreatedDate = LAST_YEAR
        contentType:
          type: string
          enum:
          - CSV
          default: CSV
          description: The format of the results. Currently only CSV is supported.
          example: CSV
        columnDelimiter:
          type: string
          enum:
          - COMMA
          - TAB
          - PIPE
          - SEMICOLON
          - CARET
          - BACKQUOTE
          default: COMMA
          description: The delimiter character used between fields in the CSV output.
          example: COMMA
        lineEnding:
          type: string
          enum:
          - LF
          - CRLF
          default: LF
          description: The line ending character used in the CSV output.
          example: LF
    QueryJobInfo:
      type: object
      description: >
        Detailed information about a Bulk API 2.0 query job, including its
        current state and processing statistics.
      properties:
        id:
          type: string
          description: The unique identifier of the query job.
          example: abc123
        operation:
          type: string
          enum:
          - query
          - queryAll
          description: The query operation being performed.
          example: query
        object:
          type: string
          description: >
            The primary SObject type in the SOQL query. Derived automatically
            from the query.
          example: example_value
        state:
          $ref: '#/components/schemas/JobState'
        createdDate:
          type: string
          format: date-time
          description: The date and time the job was created, in ISO 8601 format.
          example: '2026-01-15T10:30:00Z'
        systemModstamp:
          type: string
          format: date-time
          description: The date and time the job was last modified, in ISO 8601 format.
          example: '2026-01-15T10:30:00Z'
        numberRecordsProcessed:
          type: integer
          description: The number of records returned by the query.
          example: 10
        totalProcessingTime:
          type: integer
          description: Total processing time in milliseconds.
          example: 1700000000000
        errorMessage:
          type: string
          description: >
            Error message if the job reached the Failed state. Describes the
            reason for failure.
          example: example_value
        contentType:
          type: string
          enum:
          - CSV
          description: The content type of the query results.
          example: CSV
        columnDelimiter:
          type: string
          enum:
          - COMMA
          - TAB
          - PIPE
          - SEMICOLON
          - CARET
          - BACKQUOTE
          description: The column delimiter used in the results CSV.
          example: COMMA
        lineEnding:
          type: string
          enum:
          - LF
          - CRLF
          description: The line ending used in the results CSV.
          example: LF
        jobType:
          type: string
          description: The job type (V2Query for Bulk API 2.0 query jobs).
          example: example_value
        createdById:
          type: string
          description: The Salesforce user ID of the user who created the job.
          example: '500123'
        apiVersion:
          type: number
          description: The API version used to create the job.
          example: 42.5
    Error:
      type: object
      description: An error response from the Salesforce Bulk API 2.0.
      properties:
        message:
          type: string
          description: Human-readable description of the error.
          example: example_value
        errorCode:
          type: string
          description: Salesforce error code identifying the type of error.
          example: example_value
        fields:
          type: array
          description: List of field names related to the error, if applicable.
          items:
            type: string
          example: []
