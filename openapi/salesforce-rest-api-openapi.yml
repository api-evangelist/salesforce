openapi: 3.1.0
info:
  title: Salesforce REST API
  description: >
    The Salesforce REST API provides a simple and powerful web service interface
    to interact with Salesforce org data. It supports creating, reading,
    updating, deleting, and querying records using SOQL and SOSL, and is the
    primary API for building connected applications against Salesforce.
  version: v63.0
  contact:
    name: Salesforce Developers
    url: https://developer.salesforce.com/
  license:
    name: Salesforce Developer Terms
    url: https://www.salesforce.com/company/legal/agreements/
servers:
- url: https://{instance}.salesforce.com/services/data/v{version}
  description: Salesforce instance-specific REST API endpoint
  variables:
    instance:
      default: yourInstance
      description: >
        The Salesforce instance identifier (e.g., na1, eu3, or a My Domain
        subdomain like mycompany).
    version:
      default: '63.0'
      description: >
        The Salesforce API version number (e.g., 63.0). Use the latest
        supported version for new integrations.
security:
- BearerAuth: []
tags:
- name: AppMenu
  description: Retrieve Salesforce application menu items.
- name: Composite
  description: >
    Batch and composite request patterns for reducing round trips and
    supporting dependent multi-step requests.
- name: Limits
  description: Retrieve current API limit usage and quotas for the org.
- name: Query
  description: Execute SOQL queries against Salesforce data.
- name: QueryAll
  description: >
    Execute SOQL queryAll to include soft-deleted and archived records in
    results.
- name: Recent
  description: Retrieve recently viewed records for the current user.
- name: Search
  description: Execute SOSL searches across multiple objects.
- name: SObjects
  description: >
    Operations for listing, describing, creating, reading, updating, and
    deleting Salesforce SObject records and metadata.
- name: Versions
  description: Retrieve available API versions for the Salesforce instance.
paths:
  /:
    get:
      operationId: listApiVersions
      summary: Salesforce List Available Api Versions
      description: >
        Returns a list of all Salesforce REST API versions available on this
        instance. Each entry includes the version number, label, and URL. Use
        this to discover the latest supported version before building
        integrations.
      tags:
      - Versions
      responses:
        '200':
          description: A list of available API versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiVersion'
              examples:
                Listapiversions200Example:
                  summary: Default listApiVersions 200 response
                  x-microcks-default: true
                  value:
                  - version: example_value
                    label: Example Title
                    url: https://www.example.com
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Listapiversions401Example:
                  summary: Default listApiVersions 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /sobjects:
    get:
      operationId: listSObjects
      summary: Salesforce List All Sobjects
      description: >
        Returns a list of all available SObject types in the org, including both
        standard and custom objects. Each entry includes the object name, label,
        key prefix, and whether the object is queryable, searchable, and
        retrievable.
      tags:
      - SObjects
      responses:
        '200':
          description: A list of all SObject types available in the org.
          content:
            application/json:
              schema:
                type: object
                properties:
                  encoding:
                    type: string
                    description: Character encoding used in the response.
                  maxBatchSize:
                    type: integer
                    description: Maximum number of records returned in a batch.
                  sobjects:
                    type: array
                    description: Array of SObject summary descriptors.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: API name of the SObject type.
                        label:
                          type: string
                          description: User-facing label for the SObject type.
                        keyPrefix:
                          type: string
                          description: >
                            Three-character prefix used in Salesforce record IDs
                            to identify the object type.
                        queryable:
                          type: boolean
                          description: Whether the object supports SOQL queries.
                        searchable:
                          type: boolean
                          description: Whether the object supports SOSL searches.
                        retrieveable:
                          type: boolean
                          description: Whether individual records can be retrieved.
                        urls:
                          type: object
                          description: >
                            Map of REST endpoint URLs for this object
                            (sobject, describe, rowTemplate).
              examples:
                Listsobjects200Example:
                  summary: Default listSObjects 200 response
                  x-microcks-default: true
                  value:
                    encoding: example_value
                    maxBatchSize: 10
                    sobjects:
                    - name: Example Title
                      label: Example Title
                      keyPrefix: example_value
                      queryable: true
                      searchable: true
                      retrieveable: true
                      urls: https://www.example.com
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Listsobjects401Example:
                  summary: Default listSObjects 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /sobjects/{sobjectType}:
    get:
      operationId: describeSObject
      summary: Salesforce Describe an Sobject
      description: >
        Returns metadata about a specific SObject type, including field
        definitions, relationships, and available REST endpoints. This is
        equivalent to calling the describe endpoint but returns a shorter
        summary. For the full field list use /sobjects/{sobjectType}/describe.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      responses:
        '200':
          description: Metadata describing the specified SObject type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SObjectDescribe'
              examples:
                Describesobject200Example:
                  summary: Default describeSObject 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    label: Example Title
                    labelPlural: example_value
                    keyPrefix: example_value
                    queryable: true
                    searchable: true
                    createable: true
                    updateable: true
                    deletable: true
                    fields:
                    - name: Example Title
                      label: Example Title
                      type: example_value
                      nillable: true
                      updateable: true
                      createable: true
                      length: 10
                    urls: https://www.example.com
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Describesobject401Example:
                  summary: Default describeSObject 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: The specified SObject type was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Describesobject404Example:
                  summary: Default describeSObject 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createRecord
      summary: Salesforce Create a New Record
      description: >
        Creates a new record of the specified SObject type. The request body
        must contain the field values for the new record in JSON format. Returns
        the ID of the newly created record on success.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      requestBody:
        required: true
        description: >
          Field values for the new SObject record. Required fields depend on the
          object type.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SObjectRecord'
            examples:
              CreaterecordRequestExample:
                summary: Default createRecord request
                x-microcks-default: true
                value:
                  attributes:
                    type: example_value
                    url: https://www.example.com
                  Id: abc123
      responses:
        '201':
          description: Record created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The 18-character ID of the newly created record.
                  success:
                    type: boolean
                    description: Whether the record was created successfully.
                  errors:
                    type: array
                    description: List of errors if the creation partially failed.
                    items:
                      $ref: '#/components/schemas/Error'
              examples:
                Createrecord201Example:
                  summary: Default createRecord 201 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    success: true
                    errors:
                    - message: example_value
                      errorCode: example_value
                      fields:
                      - {}
        '400':
          description: Bad request. Missing required fields or invalid field values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Createrecord400Example:
                  summary: Default createRecord 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Createrecord401Example:
                  summary: Default createRecord 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /sobjects/{sobjectType}/{id}:
    get:
      operationId: getRecord
      summary: Salesforce Get a Record by Id
      description: >
        Retrieves a single SObject record by its 18-character ID. Returns all
        accessible fields for the record. To retrieve only specific fields, use
        a SOQL query via the /query endpoint instead.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: The requested SObject record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SObjectRecord'
              examples:
                Getrecord200Example:
                  summary: Default getRecord 200 response
                  x-microcks-default: true
                  value:
                    attributes:
                      type: example_value
                      url: https://www.example.com
                    Id: abc123
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getrecord401Example:
                  summary: Default getRecord 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Record not found for the given ID and SObject type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getrecord404Example:
                  summary: Default getRecord 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      operationId: updateRecord
      summary: Salesforce Update a Record
      description: >
        Updates an existing SObject record identified by its 18-character ID.
        Only the fields included in the request body are updated; omitted fields
        retain their current values. Returns no body on success.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        description: >
          Field values to update on the SObject record. Only include fields that
          should change.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SObjectRecord'
            examples:
              UpdaterecordRequestExample:
                summary: Default updateRecord request
                x-microcks-default: true
                value:
                  attributes:
                    type: example_value
                    url: https://www.example.com
                  Id: abc123
      responses:
        '204':
          description: Record updated successfully. No body is returned.
        '400':
          description: Bad request. Invalid field values or field not updateable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Updaterecord400Example:
                  summary: Default updateRecord 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Updaterecord401Example:
                  summary: Default updateRecord 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Record not found for the given ID and SObject type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Updaterecord404Example:
                  summary: Default updateRecord 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteRecord
      summary: Salesforce Delete a Record
      description: >
        Deletes an existing SObject record by its 18-character ID. The record is
        moved to the Recycle Bin unless the object does not support soft delete,
        in which case it is permanently removed.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Record deleted successfully. No body is returned.
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Deleterecord401Example:
                  summary: Default deleteRecord 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Record not found for the given ID and SObject type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Deleterecord404Example:
                  summary: Default deleteRecord 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /sobjects/{sobjectType}/{id}/{blobField}:
    get:
      operationId: getBlobField
      summary: Salesforce Get a Blob Field Value
      description: >
        Retrieves the binary content of a blob (binary large object) field on an
        SObject record. Examples include the Body field on Attachment or
        VersionData on ContentVersion. Returns the raw binary content with the
        appropriate MIME type.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      - $ref: '#/components/parameters/id'
      - name: blobField
        in: path
        required: true
        description: >
          The API name of the blob field to retrieve (e.g., Body, VersionData,
          Photo).
        schema:
          type: string
        example: example_value
      responses:
        '200':
          description: The raw binary content of the blob field.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: Raw binary content of the blob field.
              examples:
                Getblobfield200Example:
                  summary: Default getBlobField 200 response
                  x-microcks-default: true
                  value: example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getblobfield401Example:
                  summary: Default getBlobField 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Record or blob field not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getblobfield404Example:
                  summary: Default getBlobField 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /sobjects/{sobjectType}/describe:
    get:
      operationId: fullDescribeSObject
      summary: Salesforce Full Describe of an Sobject
      description: >
        Returns a complete description of the specified SObject type, including
        all field definitions with their data types, labels, picklist values,
        relationship metadata, and child relationships. Use this endpoint when
        you need detailed schema information for a specific object type.
      tags:
      - SObjects
      parameters:
      - $ref: '#/components/parameters/sobjectType'
      responses:
        '200':
          description: Full metadata describing the SObject type and all its fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SObjectDescribe'
              examples:
                Fulldescribesobject200Example:
                  summary: Default fullDescribeSObject 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    label: Example Title
                    labelPlural: example_value
                    keyPrefix: example_value
                    queryable: true
                    searchable: true
                    createable: true
                    updateable: true
                    deletable: true
                    fields:
                    - name: Example Title
                      label: Example Title
                      type: example_value
                      nillable: true
                      updateable: true
                      createable: true
                      length: 10
                    urls: https://www.example.com
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Fulldescribesobject401Example:
                  summary: Default fullDescribeSObject 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: The specified SObject type was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Fulldescribesobject404Example:
                  summary: Default fullDescribeSObject 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /query:
    post:
      operationId: executeQuery
      summary: Salesforce Execute a Soql Query
      description: >
        Executes a SOQL (Salesforce Object Query Language) query and returns
        matching records. The query is passed in the request body as a JSON
        object with a "q" property. If results span multiple pages, a
        nextRecordsUrl is included to retrieve the next batch.
      tags:
      - Query
      requestBody:
        required: true
        description: SOQL query to execute against Salesforce data.
        content:
          application/json:
            schema:
              type: object
              required:
              - q
              properties:
                q:
                  type: string
                  description: >
                    The SOQL query string to execute. Must be a valid SOQL
                    statement including SELECT, FROM, and optional WHERE, ORDER
                    BY, LIMIT clauses.
                  example: SELECT Id, Name, Email FROM Contact WHERE IsDeleted = false LIMIT 200
            examples:
              ExecutequeryRequestExample:
                summary: Default executeQuery request
                x-microcks-default: true
                value:
                  q: example_value
      responses:
        '200':
          description: Query results with totalSize, done flag, and records array.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
              examples:
                Executequery200Example:
                  summary: Default executeQuery 200 response
                  x-microcks-default: true
                  value:
                    totalSize: 42
                    done: true
                    nextRecordsUrl: https://www.example.com
                    records:
                    - attributes: {}
                      Id: abc123
        '400':
          description: Bad request. Invalid SOQL syntax or query validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Executequery400Example:
                  summary: Default executeQuery 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Executequery401Example:
                  summary: Default executeQuery 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /query/{queryId}:
    get:
      operationId: getNextQueryPage
      summary: Salesforce Get the Next Page of Query Results
      description: >
        Retrieves the next page of results from a paginated SOQL query. The
        queryId is obtained from the nextRecordsUrl in a previous query response.
        Continue calling this endpoint until the done field in the response is
        true.
      tags:
      - Query
      parameters:
      - name: queryId
        in: path
        required: true
        description: >
          The query ID token from the nextRecordsUrl of a previous query
          response.
        schema:
          type: string
        example: '500123'
      responses:
        '200':
          description: >
            The next page of query results. Check the done field to determine if
            more pages remain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
              examples:
                Getnextquerypage200Example:
                  summary: Default getNextQueryPage 200 response
                  x-microcks-default: true
                  value:
                    totalSize: 42
                    done: true
                    nextRecordsUrl: https://www.example.com
                    records:
                    - attributes: {}
                      Id: abc123
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getnextquerypage401Example:
                  summary: Default getNextQueryPage 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '404':
          description: Query ID not found or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Getnextquerypage404Example:
                  summary: Default getNextQueryPage 404 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /queryAll:
    post:
      operationId: executeQueryAll
      summary: Salesforce Execute a Queryall (includes Deleted Records)
      description: >
        Executes a SOQL query that includes soft-deleted records and archived
        records in the results, unlike the standard /query endpoint which
        excludes them. Use this endpoint for data recovery, audit trails, or
        replication scenarios where deleted records must be included.
      tags:
      - QueryAll
      requestBody:
        required: true
        description: SOQL query to execute, including deleted and archived records.
        content:
          application/json:
            schema:
              type: object
              required:
              - q
              properties:
                q:
                  type: string
                  description: >
                    The SOQL query string to execute. Deleted and archived
                    records matching the query criteria will be included in
                    results.
                  example: SELECT Id, Name, IsDeleted FROM Contact WHERE IsDeleted = true
            examples:
              ExecutequeryallRequestExample:
                summary: Default executeQueryAll request
                x-microcks-default: true
                value:
                  q: example_value
      responses:
        '200':
          description: >
            Query results including deleted and archived records, with totalSize,
            done flag, and records array.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
              examples:
                Executequeryall200Example:
                  summary: Default executeQueryAll 200 response
                  x-microcks-default: true
                  value:
                    totalSize: 42
                    done: true
                    nextRecordsUrl: https://www.example.com
                    records:
                    - attributes: {}
                      Id: abc123
        '400':
          description: Bad request. Invalid SOQL syntax or query validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Executequeryall400Example:
                  summary: Default executeQueryAll 400 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Executequeryall401Example:
                  summary: Default executeQueryAll 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /search:
    get:
      operationId: executeSearch
      summary: Salesforce Execute a Sosl Search
      description: >
