components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        OAuth 2.0 Bearer token obtained from the Salesforce OAuth 2.0 token
        endpoint. Include this token in the Authorization header as
        "Bearer {access_token}".
  parameters:
    sobjectType:
      name: sobjectType
      in: path
      required: true
      description: >
        The API name of the Salesforce SObject type (e.g., Account, Contact,
        Opportunity, MyCustomObject__c).
      schema:
        type: string
    id:
      name: id
      in: path
      required: true
      description: The 18-character Salesforce record ID.
      schema:
        type: string
        minLength: 15
        maxLength: 18
  schemas:
    ApiVersion:
      type: object
      description: >
        Metadata about a single available Salesforce REST API version on this
        instance.
      properties:
        version:
          type: string
          description: The API version number (e.g., "63.0").
          example: example_value
        label:
          type: string
          description: Descriptive label for this API version (e.g., "Winter '25").
          example: Example Title
        url:
          type: string
          format: uri
          description: >
            The REST endpoint URL for this specific API version on the current
            instance.
          example: https://www.example.com
    SObjectRecord:
      type: object
      description: >
        A Salesforce SObject record. Contains an attributes object describing
        the record type and URL, plus any number of field name/value pairs
        depending on the object type.
      required:
      - attributes
      properties:
        attributes:
          type: object
          description: >
            Metadata attributes for this SObject record, including its type and
            REST API URL.
          required:
          - type
          properties:
            type:
              type: string
              description: The API name of the SObject type (e.g., Account, Contact).
            url:
              type: string
              format: uri
              description: The REST API URL for this specific record.
          example: example_value
        Id:
          type: string
          description: The 18-character globally unique Salesforce record ID.
          minLength: 15
          maxLength: 18
          example: abc123
      additionalProperties: true
    SObjectDescribe:
      type: object
      description: >
        Metadata describing a Salesforce SObject type, including its fields,
        relationships, and capabilities.
      properties:
        name:
          type: string
          description: The API name of the SObject type.
          example: Example Title
        label:
          type: string
          description: The user-facing singular label for this object type.
          example: Example Title
        labelPlural:
          type: string
          description: The user-facing plural label for this object type.
          example: example_value
        keyPrefix:
          type: string
          description: The three-character key prefix used in record IDs for this type.
          example: example_value
        queryable:
          type: boolean
          description: Whether records of this type can be queried with SOQL.
          example: true
        searchable:
          type: boolean
          description: Whether records of this type can be searched with SOSL.
          example: true
        createable:
          type: boolean
          description: Whether new records of this type can be created via the API.
          example: true
        updateable:
          type: boolean
          description: Whether existing records of this type can be updated via the API.
          example: true
        deletable:
          type: boolean
          description: Whether records of this type can be deleted via the API.
          example: true
        fields:
          type: array
          description: Detailed metadata for each field on this SObject type.
          items:
            type: object
            properties:
              name:
                type: string
                description: The API name of the field.
              label:
                type: string
                description: The user-facing label for this field.
              type:
                type: string
                description: >
                  The data type of the field (e.g., string, boolean, date,
                  reference, picklist).
              nillable:
                type: boolean
                description: Whether this field can be set to null.
              updateable:
                type: boolean
                description: Whether this field can be updated via the API.
              createable:
                type: boolean
                description: Whether this field can be set when creating a record.
              length:
                type: integer
                description: >
                  Maximum character length for string fields. Zero for
                  non-string fields.
          example: []
        urls:
          type: object
          description: Map of REST endpoint URLs for this SObject type.
          example: https://www.example.com
    QueryResult:
      type: object
      description: >
        The result of a SOQL query, containing the matching records and
        pagination metadata.
      required:
      - totalSize
      - done
      - records
      properties:
        totalSize:
          type: integer
          description: >
            The total number of records matching the query. May be larger than
            the number of records in the current page if the result is paginated.
          example: 42
        done:
          type: boolean
          description: >
            Whether all query results have been returned. If false, use
            nextRecordsUrl to retrieve the next page.
          example: true
        nextRecordsUrl:
          type: string
          format: uri
          description: >
            URL to retrieve the next page of results. Only present when done is
            false.
          example: https://www.example.com
        records:
          type: array
          description: >
            Array of SObject records matching the query. May be a partial
            result if the total exceeds the page size.
          items:
            $ref: '#/components/schemas/SObjectRecord'
          example: []
    SearchResult:
      type: object
      description: >
        The result of a SOSL search, containing matching records grouped by
        SObject type.
      properties:
        searchRecords:
          type: array
          description: >
            Array of records matching the SOSL search query. Each record
            includes the object type in its attributes.
          items:
            $ref: '#/components/schemas/SObjectRecord'
          example: []
    CompositeRequest:
      type: object
      description: >
        A composite request containing an ordered series of subrequests where
        later requests can reference the results of earlier ones using reference
        IDs.
      required:
      - compositeRequest
      properties:
        allOrNone:
          type: boolean
          default: false
          description: >
            If true, all subrequests must succeed or all changes are rolled back.
            If false, subrequests are processed independently.
          example: true
        collateSubrequests:
          type: boolean
          default: false
          description: >
            If true, similar subrequests are grouped for more efficient
            processing.
          example: true
        compositeRequest:
          type: array
          description: >
            Ordered array of subrequests. Later subrequests can reference
            results from earlier ones using @{referenceId.field} syntax.
          maxItems: 25
          items:
            type: object
            required:
            - method
            - url
            - referenceId
            properties:
              method:
                type: string
                enum:
                - GET
                - POST
                - PATCH
                - DELETE
                description: HTTP method for this subrequest.
              url:
                type: string
                description: Relative URL for this subrequest.
              referenceId:
                type: string
                description: >
                  Unique identifier for this subrequest. Used to reference this
                  subrequest's results in subsequent subrequests.
              body:
                type: object
                description: Request body for POST and PATCH subrequests.
          example: []
    CompositeResponse:
      type: object
      description: >
        The result of a composite request, containing results for each
        subrequest in order.
      properties:
        compositeResponse:
          type: array
          description: >
            Array of results corresponding to each subrequest, in the same
            order as the input compositeRequest array.
          items:
            type: object
            properties:
              body:
                description: Response body of the subrequest.
              httpHeaders:
                type: object
                description: Response HTTP headers for the subrequest.
              httpStatusCode:
                type: integer
                description: HTTP status code of the subrequest.
              referenceId:
                type: string
                description: The reference ID of the corresponding subrequest.
          example: []
    Error:
      type: object
      description: >
        An error response from the Salesforce REST API, describing the problem
        with the request.
      properties:
        message:
          type: string
          description: Human-readable description of the error.
          example: example_value
        errorCode:
          type: string
          description: >
            Salesforce error code (e.g., MALFORMED_QUERY, INVALID_FIELD,
            REQUIRED_FIELD_MISSING).
          example: example_value
        fields:
          type: array
          description: >
            List of field names related to the error, if applicable (e.g., for
            field validation errors).
          items:
            type: string
          example: []
