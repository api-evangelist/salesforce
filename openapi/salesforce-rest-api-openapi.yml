  /composite/batch:
    post:
      operationId: executeBatchRequest
      summary: Salesforce Execute a Batch of Requests
      description: >
        Executes up to 25 independent REST API subrequests in a single HTTP
        call. All requests are processed independently; failure of one does not
        affect others. Returns an array of results in the same order as the
        subrequests. Use this to reduce the number of round trips when making
        multiple unrelated requests.
      tags:
      - Composite
      requestBody:
        required: true
        description: >
          An array of up to 25 independent subrequests to execute as a batch.
        content:
          application/json:
            schema:
              type: object
              required:
              - batchRequests
              properties:
                batchRequests:
                  type: array
                  description: >
                    Array of subrequests to execute. Each subrequest is
                    independent of the others.
                  maxItems: 25
                  items:
                    type: object
                    required:
                    - method
                    - url
                    properties:
                      method:
                        type: string
                        enum:
                        - GET
                        - POST
                        - PATCH
                        - DELETE
                        description: HTTP method for the subrequest.
                      url:
                        type: string
                        description: >
                          Relative URL for the subrequest (e.g.,
                          /services/data/v63.0/sobjects/Account/001...).
                      richInput:
                        type: object
                        description: >
                          Request body for POST and PATCH subrequests.
                haltOnError:
                  type: boolean
                  default: false
                  description: >
                    If true, stop processing subsequent subrequests after the
                    first error occurs.
            examples:
              ExecutebatchrequestRequestExample:
                summary: Default executeBatchRequest request
                x-microcks-default: true
                value:
                  batchRequests:
                  - method: GET
                    url: https://www.example.com
                    richInput: example_value
                  haltOnError: true
      responses:
        '200':
          description: Results for each subrequest in the batch, in the same order.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasErrors:
                    type: boolean
                    description: Whether any subrequest returned an error response.
                  results:
                    type: array
                    description: >
                      Array of subrequest results in the same order as the input
                      batchRequests.
                    items:
                      type: object
                      properties:
                        statusCode:
                          type: integer
                          description: HTTP status code of the subrequest.
                        result:
                          description: Response body of the subrequest.
              examples:
                Executebatchrequest200Example:
                  summary: Default executeBatchRequest 200 response
                  x-microcks-default: true
                  value:
                    hasErrors: true
                    results:
                    - statusCode: 10
                      result: example_value
        '401':
          description: Unauthorized. Invalid or expired OAuth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Executebatchrequest401Example:
                  summary: Default executeBatchRequest 401 response
                  x-microcks-default: true
                  value:
                    message: example_value
                    errorCode: example_value
                    fields:
                    - example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
