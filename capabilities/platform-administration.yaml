naftiko: 1.0.0-alpha2
info:
  label: Salesforce Platform Administration
  description: Unified capability for Salesforce platform administration workflows combining the platform API and UI API for
    identity management, OAuth administration, metadata exploration, and application configuration. Used by Salesforce admins
    and platform engineers.
  tags:
  - Salesforce
  - Platform Administration
  - Identity
  - OAuth
  - Metadata
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SALESFORCE_ACCESS_TOKEN: SALESFORCE_ACCESS_TOKEN
    SALESFORCE_CLIENT_ID: SALESFORCE_CLIENT_ID
    SALESFORCE_CLIENT_SECRET: SALESFORCE_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: salesforce-platform
    baseUri: https://login.salesforce.com
    description: Salesforce platform API for OAuth, identity, bulk operations, composite requests, SObjects, files, credentials,
      Chatter, expression sets, and platform events.
    authentication:
      type: bearer
      token: '{{SALESFORCE_ACCESS_TOKEN}}'
    resources:
    - name: authentication
      path: /services/auth/headless
      description: Headless authentication and registration operations.
      operations:
      - name: registration-initialize
        method: POST
        path: /init/registration
        description: Initialize headless registration flow.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            userdata: '{{tools.userdata}}'
      - name: registration-authorize
        method: POST
        path: /authorize/registration
        description: Authorize headless registration.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            identifier: '{{tools.identifier}}'
    - name: oauth
      path: /services/oauth2
      description: OAuth 2.0 token and user info operations.
      operations:
      - name: get-user-info
        method: GET
        path: /userinfo
        description: Get the authenticated user's profile information.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: revoke-token
        method: POST
        path: /revoke
        description: Revoke an OAuth token.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            token: '{{tools.token}}'
    - name: sobjects
      path: /services/data
      description: SObject CRUD operations.
      operations:
      - name: describe-global
        method: GET
        path: /v63.0/sobjects
        description: List all SObject types available in the org.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sobject-describe
        method: GET
        path: /v63.0/sobjects/{sobjectType}/describe
        description: Get full metadata for an SObject type.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sobject-create
        method: POST
        path: /v63.0/sobjects/{sobjectType}
        description: Create a new SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fields: '{{tools.fields}}'
      - name: sobject-get
        method: GET
        path: /v63.0/sobjects/{sobjectType}/{id}
        description: Get an SObject record by ID.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sobject-update
        method: PATCH
        path: /v63.0/sobjects/{sobjectType}/{id}
        description: Update an SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fields: '{{tools.fields}}'
      - name: sobject-delete
        method: DELETE
        path: /v63.0/sobjects/{sobjectType}/{id}
        description: Delete an SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: composite
      path: /services/data/v63.0/composite
      description: Composite and batch request operations.
      operations:
      - name: execute-composite
        method: POST
        path: /
        description: Execute a composite request with dependent subrequests.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            compositeRequest: '{{tools.composite_request}}'
      - name: execute-batch
        method: POST
        path: /batch
        description: Execute a batch of independent requests.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            batchRequests: '{{tools.batch_requests}}'
    - name: search
      path: /services/data/v63.0
      description: SOQL query and SOSL search operations.
      operations:
      - name: execute-search
        method: GET
        path: /search
        description: Execute a SOSL search.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: The SOSL search string.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: salesforce-rest
    baseUri: https://{instance}.salesforce.com/services/data/v63.0
    description: Salesforce REST API for SObject CRUD, SOQL queries, SOSL searches, composite requests, and org limits.
    authentication:
      type: bearer
      token: '{{SALESFORCE_ACCESS_TOKEN}}'
    resources:
    - name: versions
      path: /
      description: API version information.
      operations:
      - name: list-api-versions
        method: GET
        path: /
        description: List available Salesforce REST API versions.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sobjects
      path: /sobjects
      description: SObject CRUD and metadata operations.
      operations:
      - name: list-sobjects
        method: GET
        path: /
        description: List all SObject types available in the org.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-sobject
        method: GET
        path: /{sobjectType}
        description: Get basic metadata for an SObject type.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: full-describe-sobject
        method: GET
        path: /{sobjectType}/describe
        description: Get full metadata for an SObject type including all fields.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-record
        method: POST
        path: /{sobjectType}
        description: Create a new SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fields: '{{tools.fields}}'
      - name: get-record
        method: GET
        path: /{sobjectType}/{id}
        description: Get an SObject record by ID.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The 18-character record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-record
        method: PATCH
        path: /{sobjectType}/{id}
        description: Update an SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The 18-character record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fields: '{{tools.fields}}'
      - name: delete-record
        method: DELETE
        path: /{sobjectType}/{id}
        description: Delete an SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The 18-character record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-blob-field
        method: GET
        path: /{sobjectType}/{id}/{blobField}
        description: Get binary content of a blob field on an SObject record.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: id
          in: path
          type: string
          required: true
          description: The 18-character record ID.
        - name: blobField
          in: path
          type: string
          required: true
          description: The blob field API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: query
      path: /
      description: SOQL query operations.
      operations:
      - name: execute-query
        method: POST
        path: /query
        description: Execute a SOQL query.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            q: '{{tools.q}}'
      - name: get-next-query-page
        method: GET
        path: /query/{queryId}
        description: Get the next page of query results.
        inputParameters:
        - name: queryId
          in: path
          type: string
          required: true
          description: The query ID token from nextRecordsUrl.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: execute-query-all
        method: POST
        path: /queryAll
        description: Execute a SOQL queryAll including deleted and archived records.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            q: '{{tools.q}}'
    - name: search
      path: /
      description: SOSL search operations.
      operations:
      - name: execute-search
        method: GET
        path: /search
        description: Execute a SOSL search across multiple objects.
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: The SOSL search string.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: limits
      path: /
      description: Org limit operations.
      operations:
      - name: get-org-limits
        method: GET
        path: /limits
        description: Get current API limit usage and quotas for the org.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recent
      path: /
      description: Recently viewed records.
      operations:
      - name: get-recently-viewed-records
        method: GET
        path: /recent
        description: Get recently viewed records for the current user.
        inputParameters:
        - name: recentlyViewedCount
          in: query
          type: integer
          required: false
          description: Number of recently viewed records to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: app-menu
      path: /
      description: App menu operations.
      operations:
      - name: get-app-switcher-menu
        method: GET
        path: /appMenu/AppSwitcher
        description: Get the app switcher menu items.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: composite
      path: /composite
      description: Composite and batch request operations.
      operations:
      - name: execute-batch-request
        method: POST
        path: /batch
        description: Execute a batch of up to 25 independent requests.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            batchRequests: '{{tools.batch_requests}}'
      - name: execute-composite-request
        method: POST
        path: /
        description: Execute a composite request with dependent subrequests.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            compositeRequest: '{{tools.composite_request}}'
      - name: collections-create
        method: POST
        path: /sobjects
        description: Create up to 200 records in a single call.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            records: '{{tools.records}}'
      - name: collections-update
        method: PATCH
        path: /sobjects
        description: Update up to 200 records in a single call.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            records: '{{tools.records}}'
      - name: collections-delete
        method: DELETE
        path: /sobjects
        description: Delete up to 200 records in a single call.
        inputParameters:
        - name: ids
          in: query
          type: string
          required: true
          description: Comma-separated list of record IDs to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: collections-retrieve
        method: GET
        path: /sobjects/{sobjectType}
        description: Retrieve up to 2000 records of the same type.
        inputParameters:
        - name: sobjectType
          in: path
          type: string
          required: true
          description: The SObject type API name.
        - name: ids
          in: query
          type: string
          required: true
          description: Comma-separated list of record IDs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: salesforce-ui
    baseUri: https://{instanceName}.salesforce.com/services/data/v59.0/ui-api
    description: Salesforce UI API for records, object metadata, picklist values, list views, and lookups.
    authentication:
      type: bearer
      token: '{{SALESFORCE_ACCESS_TOKEN}}'
    resources:
    - name: records
      path: /records
      description: Record CRUD operations with UI metadata.
      operations:
      - name: get-record
        method: GET
        path: /{recordId}
        description: Get a record with field values formatted for UI display.
        inputParameters:
        - name: recordId
          in: path
          type: string
          required: true
          description: The 18-character Salesforce record ID.
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated list of field API names.
        - name: layoutTypes
          in: query
          type: string
          required: false
          description: Layout types (Full, Compact).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-record
        method: POST
        path: /
        description: Create a new Salesforce record.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            apiName: '{{tools.api_name}}'
            fields: '{{tools.fields}}'
      - name: update-record
        method: PATCH
        path: /{recordId}
        description: Update fields on a Salesforce record.
        inputParameters:
        - name: recordId
          in: path
          type: string
          required: true
          description: The 18-character Salesforce record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            fields: '{{tools.fields}}'
      - name: delete-record
        method: DELETE
        path: /{recordId}
        description: Delete a Salesforce record.
        inputParameters:
        - name: recordId
          in: path
          type: string
          required: true
          description: The 18-character Salesforce record ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: object-info
      path: /object-info
      description: Object metadata operations.
      operations:
      - name: get-object-info
        method: GET
        path: /{objectApiName}
        description: Get metadata about a Salesforce object including fields, types, and permissions.
        inputParameters:
        - name: objectApiName
          in: path
          type: string
          required: true
          description: The object API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-picklist-values
        method: GET
        path: /{objectApiName}/picklist-values/{recordTypeId}
        description: Get picklist values for all picklist fields on an object.
        inputParameters:
        - name: objectApiName
          in: path
          type: string
          required: true
          description: The object API name.
        - name: recordTypeId
          in: path
          type: string
          required: true
          description: The record type ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-views
      path: /list-ui
      description: List view operations.
      operations:
      - name: get-lists-by-object
        method: GET
        path: /{objectApiName}
        description: Get list views for an object.
        inputParameters:
        - name: objectApiName
          in: path
          type: string
          required: true
          description: The object API name.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of records per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-list-view
        method: GET
        path: /{objectApiName}/{listViewApiName}
        description: Get a specific list view.
        inputParameters:
        - name: objectApiName
          in: path
          type: string
          required: true
          description: The object API name.
        - name: listViewApiName
          in: path
          type: string
          required: true
          description: The list view API name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lookups
      path: /lookups
      description: Lookup field search operations.
      operations:
      - name: get-lookup-records
        method: GET
        path: /{objectApiName}/{fieldApiName}
        description: Search lookup field records for typeahead.
        inputParameters:
        - name: objectApiName
          in: path
          type: string
          required: true
          description: The object API name.
        - name: fieldApiName
          in: path
          type: string
          required: true
          description: The lookup field API name.
        - name: searchTerm
          in: query
          type: string
          required: true
          description: The search text.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: platform-administration-api
    description: Unified REST API for Salesforce platform administration.
    resources:
    - path: /v1/user-info
      name: user-info
      description: Authenticated user information.
      operations:
      - method: GET
        name: get-user-info
        description: Get the authenticated user's profile information.
        call: salesforce-platform.get-user-info
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api-versions
      name: api-versions
      description: Salesforce API version information.
      operations:
      - method: GET
        name: list-api-versions
        description: List available Salesforce REST API versions.
        call: salesforce-rest.list-api-versions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/limits
      name: limits
      description: Org API limits.
      operations:
      - method: GET
        name: get-org-limits
        description: Get current API limit usage and quotas.
        call: salesforce-rest.get-org-limits
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app-menu
      name: app-menu
      description: App switcher menu items.
      operations:
      - method: GET
        name: get-app-switcher-menu
        description: Get the app switcher menu items.
        call: salesforce-rest.get-app-switcher-menu
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sobjects
      name: sobjects
      description: SObject type listing.
      operations:
      - method: GET
        name: list-sobjects
        description: List all SObject types in the org.
        call: salesforce-rest.list-sobjects
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sobjects/{sobjectType}/describe
      name: sobject-describe
      description: Full SObject metadata.
      operations:
      - method: GET
        name: full-describe-sobject
        description: Get full metadata for an SObject type.
        call: salesforce-rest.full-describe-sobject
        with:
          sobjectType: rest.sobjectType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/object-info/{objectApiName}
      name: object-info
      description: UI-ready object metadata.
      operations:
      - method: GET
        name: get-object-info
        description: Get UI-ready metadata for an object.
        call: salesforce-ui.get-object-info
        with:
          objectApiName: rest.objectApiName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/picklist-values/{objectApiName}/{recordTypeId}
      name: picklist-values
      description: Picklist value retrieval.
      operations:
      - method: GET
        name: get-picklist-values
        description: Get picklist values for all picklist fields on an object.
        call: salesforce-ui.get-picklist-values
        with:
          objectApiName: rest.objectApiName
          recordTypeId: rest.recordTypeId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: platform-administration-mcp
    transport: http
    description: MCP server for AI-assisted Salesforce platform administration.
    tools:
    - name: get-user-info
      description: Get the authenticated user's profile information.
      hints:
        readOnly: true
        idempotent: true
      call: salesforce-platform.get-user-info
      outputParameters:
      - type: object
        mapping: $.
    - name: list-api-versions
      description: List available Salesforce REST API versions.
      hints:
        readOnly: true
        idempotent: true
      call: salesforce-rest.list-api-versions
      outputParameters:
      - type: object
        mapping: $.
    - name: get-org-limits
      description: Get current API limit usage and remaining quotas for the org.
      hints:
        readOnly: true
        idempotent: true
      call: salesforce-rest.get-org-limits
      outputParameters:
      - type: object
        mapping: $.
    - name: get-app-switcher-menu
      description: Get the app switcher menu items available to the current user.
      hints:
        readOnly: true
        idempotent: true
      call: salesforce-rest.get-app-switcher-menu
      outputParameters:
      - type: object
        mapping: $.
    - name: list-sobjects
      description: List all SObject types available in the Salesforce org.
      hints:
