naftiko: "1.0.0-alpha1"

info:
  label: "Salesforce"
  description: "The Salesforce platform API collection covering OAuth authentication, headless registration, identity management, bulk operations, composite requests, SObject CRUD, files, credentials, Chatter feeds, expression sets, decision models, platform events, and more."
  tags:
    - Salesforce
    - Platform
    - Identity
    - OAuth
    - SObjects
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SALESFORCE_ACCESS_TOKEN: SALESFORCE_ACCESS_TOKEN
      SALESFORCE_CLIENT_ID: SALESFORCE_CLIENT_ID
      SALESFORCE_CLIENT_SECRET: SALESFORCE_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: salesforce-platform
      baseUri: https://login.salesforce.com
      description: "Salesforce platform API for OAuth, identity, bulk operations, composite requests, SObjects, files, credentials, Chatter, expression sets, and platform events."
      authentication:
        type: bearer
        token: "{{SALESFORCE_ACCESS_TOKEN}}"
      resources:
        - name: authentication
          path: /services/auth/headless
          description: "Headless authentication and registration operations."
          operations:
            - name: registration-initialize
              method: POST
              path: /init/registration
              description: "Initialize headless registration flow."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  userdata: "{{tools.userdata}}"
            - name: registration-authorize
              method: POST
              path: /authorize/registration
              description: "Authorize headless registration."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  identifier: "{{tools.identifier}}"

        - name: oauth
          path: /services/oauth2
          description: "OAuth 2.0 token and user info operations."
          operations:
            - name: get-user-info
              method: GET
              path: /userinfo
              description: "Get the authenticated user's profile information."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: revoke-token
              method: POST
              path: /revoke
              description: "Revoke an OAuth token."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  token: "{{tools.token}}"

        - name: sobjects
          path: /services/data
          description: "SObject CRUD operations."
          operations:
            - name: describe-global
              method: GET
              path: /v63.0/sobjects
              description: "List all SObject types available in the org."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: sobject-describe
              method: GET
              path: /v63.0/sobjects/{sobjectType}/describe
              description: "Get full metadata for an SObject type."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: sobject-create
              method: POST
              path: /v63.0/sobjects/{sobjectType}
              description: "Create a new SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
            - name: sobject-get
              method: GET
              path: /v63.0/sobjects/{sobjectType}/{id}
              description: "Get an SObject record by ID."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: sobject-update
              method: PATCH
              path: /v63.0/sobjects/{sobjectType}/{id}
              description: "Update an SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
            - name: sobject-delete
              method: DELETE
              path: /v63.0/sobjects/{sobjectType}/{id}
              description: "Delete an SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: composite
          path: /services/data/v63.0/composite
          description: "Composite and batch request operations."
          operations:
            - name: execute-composite
              method: POST
              path: /
              description: "Execute a composite request with dependent subrequests."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  compositeRequest: "{{tools.composite_request}}"
            - name: execute-batch
              method: POST
              path: /batch
              description: "Execute a batch of independent requests."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  batchRequests: "{{tools.batch_requests}}"

        - name: search
          path: /services/data/v63.0
          description: "SOQL query and SOSL search operations."
          operations:
            - name: execute-search
              method: GET
              path: /search
              description: "Execute a SOSL search."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "The SOSL search string."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: salesforce-platform-api
      resources:
        - path: /v1/user-info
          name: user-info
          description: "User information."
          operations:
            - method: GET
              name: get-user-info
              description: "Get authenticated user info."
              call: "salesforce-platform.get-user-info"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: salesforce-platform-mcp
      transport: http
      tools:
        - name: get-user-info
          description: "Get the authenticated user's profile information."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-platform.get-user-info"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-global
          description: "List all SObject types available in the org."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-platform.describe-global"
          outputParameters:
            - type: object
              mapping: "$."
