naftiko: "1.0.0-alpha1"

info:
  label: "Salesforce Bulk API 2.0"
  description: "Salesforce Bulk API 2.0 provides a simplified REST-based interface for bulk data operations. It uses a straightforward job model and supports CSV format for ingest and query jobs, enabling processing of millions of records asynchronously."
  tags:
    - Salesforce
    - Bulk API
    - Data Loading
    - ETL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SALESFORCE_ACCESS_TOKEN: SALESFORCE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: salesforce-bulk
      baseUri: https://{instance}.salesforce.com/services/data/v63.0/jobs
      description: "Salesforce Bulk API 2.0 for asynchronous bulk data ingest and query operations."
      authentication:
        type: bearer
        token: "{{SALESFORCE_ACCESS_TOKEN}}"
      resources:
        - name: ingest-jobs
          path: /ingest
          description: "Ingest job management operations."
          operations:
            - name: create-ingest-job
              method: POST
              path: /
              description: "Create a new ingest job for bulk data operations."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  operation: "{{tools.operation}}"
                  object: "{{tools.object}}"
            - name: list-ingest-jobs
              method: GET
              path: /
              description: "List ingest jobs in the org."
              inputParameters:
                - name: jobType
                  in: query
                  type: string
                  required: false
                  description: "Filter by job type (Classic or V2Ingest)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-ingest-job-info
              method: GET
              path: /{jobId}
              description: "Get detailed information about a specific ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-ingest-job
              method: PATCH
              path: /{jobId}
              description: "Update or close an ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  state: "{{tools.state}}"
            - name: delete-ingest-job
              method: DELETE
              path: /{jobId}
              description: "Delete an ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: upload-job-data
              method: PUT
              path: /{jobId}/batches
              description: "Upload CSV data to an ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-successful-results
              method: GET
              path: /{jobId}/successfulResults
              description: "Get successfully processed records from an ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-failed-results
              method: GET
              path: /{jobId}/failedResults
              description: "Get failed records from an ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-unprocessed-records
              method: GET
              path: /{jobId}/unprocessedrecords
              description: "Get unprocessed records from an ingest job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The ingest job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: query-jobs
          path: /query
          description: "Query job management operations."
          operations:
            - name: create-query-job
              method: POST
              path: /
              description: "Create a new query job to extract data using SOQL."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  operation: "{{tools.operation}}"
                  query: "{{tools.query}}"
            - name: list-query-jobs
              method: GET
              path: /
              description: "List query jobs in the org."
              inputParameters:
                - name: jobType
                  in: query
                  type: string
                  required: false
                  description: "Filter by job type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-query-job-info
              method: GET
              path: /{jobId}
              description: "Get detailed information about a specific query job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The query job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-query-job
              method: PATCH
              path: /{jobId}
              description: "Abort or close a query job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The query job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  state: "{{tools.state}}"
            - name: delete-query-job
              method: DELETE
              path: /{jobId}
              description: "Delete a query job."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The query job ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-query-job-results
              method: GET
              path: /{jobId}/results
              description: "Get query job results as CSV data."
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: "The query job ID."
                - name: maxRecords
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of records to return."
                - name: locator
                  in: query
                  type: string
                  required: false
                  description: "Locator token for pagination."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: salesforce-bulk-standalone-api
      resources:
        - path: /v1/ingest-jobs
          name: ingest-jobs
          description: "Ingest job management."
          operations:
            - method: GET
              name: list-ingest-jobs
              description: "List ingest jobs."
              call: "salesforce-bulk.list-ingest-jobs"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: salesforce-bulk-standalone-mcp
      transport: http
      tools:
        - name: list-ingest-jobs
          description: "List ingest jobs."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-bulk.list-ingest-jobs"
          outputParameters:
            - type: object
              mapping: "$."
