naftiko: "1.0.0-alpha1"

info:
  label: "Salesforce Marketing Cloud REST API"
  description: "The Salesforce Marketing Cloud REST API provides access to Marketing Cloud resources including contacts, journeys, data extensions, triggered sends, transactional messaging, and content assets."
  tags:
    - Salesforce
    - Marketing Cloud
    - Email Marketing
    - Journeys
    - Data Extensions
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SALESFORCE_MC_CLIENT_ID: SALESFORCE_MC_CLIENT_ID
      SALESFORCE_MC_CLIENT_SECRET: SALESFORCE_MC_CLIENT_SECRET
      SALESFORCE_MC_ACCESS_TOKEN: SALESFORCE_MC_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: salesforce-mc
      baseUri: https://{subdomain}.rest.marketingcloudapis.com
      description: "Salesforce Marketing Cloud REST API for contacts, journeys, data extensions, messaging, and content assets."
      authentication:
        type: bearer
        token: "{{SALESFORCE_MC_ACCESS_TOKEN}}"
      resources:
        - name: authentication
          path: /v2
          description: "OAuth 2.0 token operations."
          operations:
            - name: get-access-token
              method: POST
              path: /token
              description: "Obtain an OAuth 2.0 access token."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  grant_type: "{{tools.grant_type}}"
                  client_id: "{{tools.client_id}}"
                  client_secret: "{{tools.client_secret}}"

        - name: contacts
          path: /contacts/v1/contacts
          description: "Contact management operations."
          operations:
            - name: list-contacts
              method: GET
              path: /
              description: "List contacts in the Marketing Cloud account."
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number to retrieve."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of contacts per page."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-contact
              method: GET
              path: /{contactKey}
              description: "Get a contact by contact key."
              inputParameters:
                - name: contactKey
                  in: path
                  type: string
                  required: true
                  description: "The unique contact key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-contacts
              method: DELETE
              path: /
              description: "Delete one or more contacts."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  contactKeys: "{{tools.contact_keys}}"

        - name: data-extensions
          path: /data/v1/async/dataextensions
          description: "Data Extension row operations."
          operations:
            - name: get-data-extension-rows
              method: GET
              path: /key:{key}/rows
              description: "Get rows from a Data Extension."
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
                  description: "The Data Extension external key."
                - name: $pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of rows per page."
                - name: $page
                  in: query
                  type: integer
                  required: false
                  description: "Page number to retrieve."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: insert-data-extension-rows
              method: POST
              path: /key:{key}/rows
              description: "Insert rows into a Data Extension."
              inputParameters:
                - name: key
                  in: path
                  type: string
                  required: true
                  description: "The Data Extension external key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  items: "{{tools.items}}"

        - name: messaging
          path: /messaging/v1
          description: "Email and SMS messaging operations."
          operations:
            - name: create-email-send
              method: POST
              path: /email/messages
              description: "Create and initiate a triggered email send."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  definitionKey: "{{tools.definition_key}}"
                  recipients: "{{tools.recipients}}"
            - name: create-sms-send
              method: POST
              path: /sms/messages
              description: "Create and initiate an SMS send."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  definitionKey: "{{tools.definition_key}}"
                  recipients: "{{tools.recipients}}"
            - name: get-message-status
              method: GET
              path: /email/messages/{messageKey}
              description: "Get the status of an email message send."
              inputParameters:
                - name: messageKey
                  in: path
                  type: string
                  required: true
                  description: "The unique message key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: journeys
          path: /interaction/v1
          description: "Journey Builder operations."
          operations:
            - name: list-journeys
              method: GET
              path: /interactions
              description: "List Marketing Cloud journeys."
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number to retrieve."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of journeys per page."
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-journey
              method: GET
              path: /interactions/{interactionId}
              description: "Get a journey by ID."
              inputParameters:
                - name: interactionId
                  in: path
                  type: string
                  required: true
                  description: "The journey interaction ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fire-journey-event
              method: POST
              path: /events
              description: "Fire a journey entry event to enroll a contact."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  ContactKey: "{{tools.contact_key}}"
                  EventDefinitionKey: "{{tools.event_definition_key}}"

        - name: assets
          path: /asset/v1/content/assets
          description: "Content Builder asset operations."
          operations:
            - name: list-assets
              method: GET
              path: /
              description: "List content assets."
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Assets per page."
                - name: assetType
                  in: query
                  type: string
                  required: false
                  description: "Filter by asset type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-asset
              method: POST
              path: /
              description: "Create a content asset."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  assetType: "{{tools.asset_type}}"
            - name: get-asset
              method: GET
              path: /{id}
              description: "Get a content asset by ID."
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The asset numeric ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-asset
              method: PUT
              path: /{id}
              description: "Update a content asset."
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The asset numeric ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-asset
              method: DELETE
              path: /{id}
              description: "Delete a content asset."
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The asset numeric ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: salesforce-mc-standalone-api
      resources:
        - path: /v1/contacts
          name: contacts
          description: "Contact operations."
          operations:
            - method: GET
              name: list-contacts
              description: "List contacts."
              call: "salesforce-mc.list-contacts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: salesforce-mc-standalone-mcp
      transport: http
      tools:
        - name: list-contacts
          description: "List Marketing Cloud contacts."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-mc.list-contacts"
          outputParameters:
            - type: object
              mapping: "$."
