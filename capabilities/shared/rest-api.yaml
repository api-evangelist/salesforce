naftiko: "1.0.0-alpha1"

info:
  label: "Salesforce REST API"
  description: "The Salesforce REST API provides a simple and powerful web service interface to interact with Salesforce org data. It supports creating, reading, updating, deleting, and querying records using SOQL and SOSL."
  tags:
    - Salesforce
    - REST API
    - SObjects
    - SOQL
    - SOSL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SALESFORCE_ACCESS_TOKEN: SALESFORCE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: salesforce-rest
      baseUri: https://{instance}.salesforce.com/services/data/v63.0
      description: "Salesforce REST API for SObject CRUD, SOQL queries, SOSL searches, composite requests, and org limits."
      authentication:
        type: bearer
        token: "{{SALESFORCE_ACCESS_TOKEN}}"
      resources:
        - name: versions
          path: /
          description: "API version information."
          operations:
            - name: list-api-versions
              method: GET
              path: /
              description: "List available Salesforce REST API versions."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sobjects
          path: /sobjects
          description: "SObject CRUD and metadata operations."
          operations:
            - name: list-sobjects
              method: GET
              path: /
              description: "List all SObject types available in the org."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: describe-sobject
              method: GET
              path: /{sobjectType}
              description: "Get basic metadata for an SObject type."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: full-describe-sobject
              method: GET
              path: /{sobjectType}/describe
              description: "Get full metadata for an SObject type including all fields."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-record
              method: POST
              path: /{sobjectType}
              description: "Create a new SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
            - name: get-record
              method: GET
              path: /{sobjectType}/{id}
              description: "Get an SObject record by ID."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The 18-character record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-record
              method: PATCH
              path: /{sobjectType}/{id}
              description: "Update an SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The 18-character record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
            - name: delete-record
              method: DELETE
              path: /{sobjectType}/{id}
              description: "Delete an SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The 18-character record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-blob-field
              method: GET
              path: /{sobjectType}/{id}/{blobField}
              description: "Get binary content of a blob field on an SObject record."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The 18-character record ID."
                - name: blobField
                  in: path
                  type: string
                  required: true
                  description: "The blob field API name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: query
          path: /
          description: "SOQL query operations."
          operations:
            - name: execute-query
              method: POST
              path: /query
              description: "Execute a SOQL query."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  q: "{{tools.q}}"
            - name: get-next-query-page
              method: GET
              path: /query/{queryId}
              description: "Get the next page of query results."
              inputParameters:
                - name: queryId
                  in: path
                  type: string
                  required: true
                  description: "The query ID token from nextRecordsUrl."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-query-all
              method: POST
              path: /queryAll
              description: "Execute a SOQL queryAll including deleted and archived records."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  q: "{{tools.q}}"

        - name: search
          path: /
          description: "SOSL search operations."
          operations:
            - name: execute-search
              method: GET
              path: /search
              description: "Execute a SOSL search across multiple objects."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "The SOSL search string."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: limits
          path: /
          description: "Org limit operations."
          operations:
            - name: get-org-limits
              method: GET
              path: /limits
              description: "Get current API limit usage and quotas for the org."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: recent
          path: /
          description: "Recently viewed records."
          operations:
            - name: get-recently-viewed-records
              method: GET
              path: /recent
              description: "Get recently viewed records for the current user."
              inputParameters:
                - name: recentlyViewedCount
                  in: query
                  type: integer
                  required: false
                  description: "Number of recently viewed records to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: app-menu
          path: /
          description: "App menu operations."
          operations:
            - name: get-app-switcher-menu
              method: GET
              path: /appMenu/AppSwitcher
              description: "Get the app switcher menu items."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: composite
          path: /composite
          description: "Composite and batch request operations."
          operations:
            - name: execute-batch-request
              method: POST
              path: /batch
              description: "Execute a batch of up to 25 independent requests."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  batchRequests: "{{tools.batch_requests}}"
            - name: execute-composite-request
              method: POST
              path: /
              description: "Execute a composite request with dependent subrequests."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  compositeRequest: "{{tools.composite_request}}"
            - name: collections-create
              method: POST
              path: /sobjects
              description: "Create up to 200 records in a single call."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  records: "{{tools.records}}"
            - name: collections-update
              method: PATCH
              path: /sobjects
              description: "Update up to 200 records in a single call."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  records: "{{tools.records}}"
            - name: collections-delete
              method: DELETE
              path: /sobjects
              description: "Delete up to 200 records in a single call."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of record IDs to delete."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: collections-retrieve
              method: GET
              path: /sobjects/{sobjectType}
              description: "Retrieve up to 2000 records of the same type."
              inputParameters:
                - name: sobjectType
                  in: path
                  type: string
                  required: true
                  description: "The SObject type API name."
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of record IDs."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: salesforce-rest-standalone-api
      resources:
        - path: /v1/sobjects
          name: sobjects
          description: "SObject operations."
          operations:
            - method: GET
              name: list-sobjects
              description: "List all SObject types."
              call: "salesforce-rest.list-sobjects"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: salesforce-rest-standalone-mcp
      transport: http
      tools:
        - name: list-sobjects
          description: "List all SObject types."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-rest.list-sobjects"
          outputParameters:
            - type: object
              mapping: "$."
